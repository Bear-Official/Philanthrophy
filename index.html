<!DOCTYPE html>
<html lang="en">

<head>
    <title>Philanthrophy</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Roboto:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.min.css">
</head>

<body>

    <header class="header">
        <div class="container">
            <div class="header__center">
                <div class="header__right">
                    <picture>
                        <a href="#">
                            <img src="../images/header-logo.svg" alt="icon: header-logo" class="header__logo">
                            <span class="header__txt">Philanthropy X</span>
                        </a>
                    </picture>
                    <nav class="nav nav-mobile">
                        <ul class="header__list">
                            <li class="header__items">
                                <a href="#" class="header__links">Home</a>
                            </li>
                            <li class="header__items">
                                <a href="#" class="header__links">About</a>
                            </li>
                            <li class="header__items">
                                <a href="#" class="header__links">Pages</a>
                            </li>
                        </ul>
                    </nav>
                </div>
                <div>
                    <div class="header--cart__buy">
                        <a href="#" class="cart">
                            <img src="../images/cart.png" alt="icon: cart" class="header__cart">
                            <button class="header__button btn btn-two" type="submit">Donate now</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <section class="help">
        <div class="container">
            <div class="help--grid">
                <div class="help__block">
                    <h1 class="help--title">Giving help to those who need it</h1>
                    <p class="help__description">
                        Lorem ipsum dolor sit amet consectetur adipiscing eli <br> mattis sit phasellus mollis sit
                        aliquam
                        sit
                        nullam.
                    </p>
                    <div class="help__buttons">
                        <button class="help__btn" type="submit">Donate now</button>
                        <button class="help__btn--btn" type="submit">About our charity</button>
                    </div>
                </div>
                <div class="help__block">
                    <img src="../images/help-image.jpg" alt="image: help-image" class="help__img">
                </div>
            </div>
        </div>

    </section>
    <script src="javascript/main.min.js"></script>
</body>

</html>
